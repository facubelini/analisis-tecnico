<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" ry="4" fill="#1e3a5f"/>

  <!-- Vela 1: verde izquierda -->
  <!-- Mecha superior -->
  <line x1="7" y1="4" x2="7" y2="8" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Cuerpo -->
  <rect x="4" y="8" width="6" height="10" rx="1" ry="1" fill="#22c55e"/>
  <!-- Mecha inferior -->
  <line x1="7" y1="18" x2="7" y2="23" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Vela 2: roja centro -->
  <!-- Mecha superior -->
  <line x1="16" y1="6" x2="16" y2="9" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Cuerpo -->
  <rect x="13" y="9" width="6" height="13" rx="1" ry="1" fill="#ef4444"/>
  <!-- Mecha inferior -->
  <line x1="16" y1="22" x2="16" y2="26" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Vela 3: verde derecha -->
  <!-- Mecha superior -->
  <line x1="25" y1="5" x2="25" y2="8" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Cuerpo -->
  <rect x="22" y="8" width="6" height="8" rx="1" ry="1" fill="#22c55e"/>
  <!-- Mecha inferior -->
  <line x1="25" y1="16" x2="25" y2="21" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
</svg>
